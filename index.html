<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StocBench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="sb-charts.js"></script>
<script defer src="render.js"></script>
<style>
  :root { --ink:#1f1f1d; --body:#4a4a46; --faint:#8a8a86; --line:#e3e3df; --tint:#f4f4f1; --dark:#161614; }
  * { box-sizing:border-box; }
  body { margin:0; background:#fcfcfa; color:var(--ink); font-family:'IBM Plex Sans',sans-serif; }
  a { color:inherit; text-decoration:none; }
  a:hover { opacity:.75; }
  h1,h2,h3 { margin:0; }
  h1,h2 { font-family:'Source Serif 4',serif; font-weight:600; }
  strong { font-weight:600; color:#1a1a18; }
  .wrap { max-width:1280px; margin:0 auto; padding:0 24px; }

  /* hero (from front matter) */
  .hero { padding:84px 0 64px; text-align:center; }
  .eyebrow { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); }
  .hero h1 { font-size:52px; line-height:1.15; max-width:880px; margin:18px auto 0; }
  .authors { font-size:17px; color:var(--body); margin:22px 0 6px; }
  .affiliation { font-size:15px; color:var(--faint); margin:0; }

  /* ">" blockquote: lede paragraph (the abstract in the hero) */
  blockquote { max-width:760px; margin:44px auto 0; font-size:16.5px; line-height:1.65; color:#3a3a37; text-align:left; text-wrap:pretty; }

  /* sections: every "##" is a band; backgrounds alternate, the last one is dark */
  .band { padding:48px 0 56px; }
  .band:nth-of-type(even) { background:var(--tint); }
  .band h2 { font-size:32px; margin:0 0 24px; }
  .band h3 { font-size:12px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); margin:36px 0 18px; }
  .band h3:first-of-type { margin-top:0; }
  .band p { font-size:15px; line-height:1.65; color:var(--body); margin:0 0 14px; text-wrap:pretty; max-width:840px; }

  .band:last-of-type { background:var(--dark); color:#e8e8e4; text-align:center; padding:64px 0 68px; }
  .band:last-of-type .wrap { max-width:820px; }
  .band:last-of-type h2 { font-size:36px; color:#fcfcfa; margin:0 0 18px; }
  .band:last-of-type h3 { color:#8a8a84; font-family:'IBM Plex Mono',monospace; }
  .band:last-of-type p { font-size:15.5px; color:#b8b8b2; max-width:none; }
  .band:last-of-type strong { color:#fcfcfa; }

  /* lists: "1." numbered, "a." lettered, "-" bullets; a bold lead becomes a headline/term */
  ol, ul { margin:0 0 18px; padding-left:34px; font-size:14.5px; line-height:1.62; color:var(--body); text-wrap:pretty; max-width:840px; }
  ol { list-style:decimal-leading-zero; }
  ol.alpha { list-style:lower-alpha; }
  ol li::marker { font:500 13px 'IBM Plex Mono',monospace; color:var(--faint); }
  li + li { margin-top:12px; }
  ol:not(.alpha) > li + li { margin-top:24px; }
  ol:not(.alpha) strong.lead { display:block; font:600 20px/1.3 'Source Serif 4',serif; color:var(--ink); margin-bottom:6px; }
  li > ul { margin:10px 0 0; padding-left:20px; max-width:none; }
  li > ul li + li { margin-top:8px; }
  li > ul li::marker { color:var(--faint); }

  /* bullet list where every item has a bold lead: card row */
  ul.cards { list-style:none; display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:28px; max-width:none; padding:24px 0 0; margin-top:36px; border-top:1px solid var(--line); font-size:13px; line-height:1.55; color:#5a5a56; }
  ul.cards li + li { margin:0; }
  ul.cards strong.lead { display:block; font-size:14px; margin-bottom:6px; }

  /* figures: images, videos, charts; "src1, src2" = side-by-side panels in one figure */
  figure { margin:26px 0 18px; }
  figure img, figure video { width:100%; border-radius:8px; display:block; background:var(--tint); }
  .panels { display:grid; gap:16px; }
  .panels img, .panels video { aspect-ratio:1; object-fit:cover; }
  figcaption { font-size:12.5px; line-height:1.5; color:var(--faint); margin-top:16px; }
  figure.media figcaption, figure.legend figcaption { text-align:center; }
  figure.legend { margin:28px 0 18px; }
  .figrow { display:grid; gap:32px; align-items:start; margin:26px 0 18px; }
  .figrow figure { margin:0; }

  /* columns: "|" at line start opens a new column (optional width after the pipe) */
  .row { display:grid; gap:36px; align-items:center; margin:0 0 14px; }
  .row figure, .row .figrow { margin:0; }
  .row ol, .row ul, .row p { margin-bottom:0; }
  .row ol { margin-top:16px; }

  /* a paragraph of links renders as buttons; a bold link is a solid button */
  .btns { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:30px; }
  .btn { display:inline-flex; align-items:center; gap:8px; border:1px solid #cfcfcb; padding:10px 20px; border-radius:6px; font-size:14px; font-weight:500; }
  .btn img { width:18px; height:18px; background:none; border-radius:0; }
  .btn.dark { background:var(--dark); border-color:var(--dark); color:#e8e8e4; }
  .band:last-of-type .btn { background:#fcfcfa; border-color:#fcfcfa; color:var(--dark); font-weight:600; }

  @media (max-width:820px) {
    .hero { padding:56px 0 44px; }
    .hero h1 { font-size:34px; }
    .row, .figrow, .panels { grid-template-columns:1fr !important; }
  }
</style>
</head>
<body>
<main id="page"></main>
</body>
</html>
